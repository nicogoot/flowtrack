<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1a1b20">
<title>FlowTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1b20;--surface:#22232a;--card:#2a2b33;--card2:#30323b;
  --border:#3a3c47;--border2:#44464f;
  --text:#e8e9ef;--muted:#8a8d9a;
  --accent:#00d4aa;--danger:#ff4757;--warn:#ffa502;--green:#2ed573;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono','Fira Code',monospace;
  --r:12px;--r2:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.topbar-logo{font-size:17px;font-weight:700;letter-spacing:-.5px;color:var(--accent)}
.topbar-logo span{color:var(--text);font-weight:400}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn-icon{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s}
.btn-icon:hover{background:var(--card2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.loading{background:var(--warn);animation:blink 1s infinite}
.sync-dot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tabnav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:57px;z-index:99}
.tabnav::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;background:transparent;color:var(--muted);border:1px solid transparent;transition:all .15s}
.tab.active{background:var(--card);color:var(--text);border-color:var(--border2)}
.tab:hover:not(.active){color:var(--text)}

.panel{display:none;padding:16px;animation:fadeIn .2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.form-control{width:100%;padding:10px 12px;border-radius:var(--r2);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;transition:border .15s}
.form-control:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.form-control{resize:vertical;min-height:70px}
select.form-control{cursor:pointer}
select.form-control option{background:var(--card)}

.btn{width:100%;padding:12px;border-radius:var(--r2);font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--card2)}

.loader{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.badge-muted{background:var(--card2);color:var(--muted)}
.badge-accent{background:rgba(0,212,170,.15);color:var(--accent)}

/* HISTORIAL */
.hist-filters{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.hist-filter-row{display:flex;gap:8px}
.hist-filter-row select,.hist-filter-row input{flex:1;padding:8px 10px;border-radius:var(--r2);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px}
.hist-filter-row select:focus,.hist-filter-row input:focus{border-color:var(--accent)}
.hist-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.hist-sum-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center}
.hist-sum-label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.hist-sum-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
thead tr{background:var(--card2)}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
tbody tr{border-top:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--card2)}
td{padding:8px 10px;color:var(--text)}
.td-mono{font-family:var(--mono);font-size:12px}
.td-muted{color:var(--muted)}
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--text)}
.sort-icon{margin-left:3px;font-size:9px;opacity:.6}
.sort-icon.active{opacity:1;color:var(--accent)}

/* TRACKER */
.tracker-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.period-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.period-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.tracker-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.tr-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px 8px;text-align:center}
.tr-stat-lbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tr-stat-val{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.cat-accordion{display:flex;flex-direction:column;gap:6px}
.cat-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.cat-item.open{border-color:var(--border2)}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.cat-header:hover{background:var(--card2)}
.cat-left{flex:1}
.cat-name{font-size:14px;font-weight:600}
.cat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.cat-right{text-align:right}
.cat-total{font-size:15px;font-weight:700;font-family:var(--mono)}
.cat-pct{font-size:11px;color:var(--muted);margin-top:2px}
.cat-arrow{margin-left:12px;color:var(--muted);font-size:12px;transition:transform .2s;flex-shrink:0}
.cat-item.open .cat-arrow{transform:rotate(180deg)}
.bar-track{height:3px;background:var(--border)}
.bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.cat-body{display:none;border-top:1px solid var(--border)}
.cat-item.open .cat-body{display:block}
.cat-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)}
.cat-stat-box{background:var(--card2);padding:10px;text-align:center}
.cat-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.cat-stat-val{font-size:13px;font-weight:600;font-family:var(--mono)}
.en-list{padding:8px 0}
.en-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.en-row:last-child{border-bottom:none}
.en-row:hover{background:var(--card2)}
.en-name{font-size:13px;color:var(--text)}
.en-right{display:flex;gap:12px;align-items:center}
.en-count{font-size:11px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:10px}
.en-amt{font-size:13px;font-weight:600;font-family:var(--mono)}

/* CONFIG */
.config-section{margin-bottom:20px}
.config-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-key{font-size:13px;color:var(--muted)}
.config-input{width:140px;padding:6px 10px;border-radius:var(--r2);background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:var(--mono);text-align:right}
.config-input:focus{border-color:var(--accent)}
.divider{height:1px;background:var(--border);margin:12px 0}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="topbar-logo">Flow<span>Track</span></div>
    <div class="topbar-actions">
      <div class="sync-dot" id="syncDot"></div>
      <button class="btn-icon" id="btnSync" onclick="syncSheet()">↻</button>
      <button class="btn-icon" onclick="showTab('config')">⚙️</button>
    </div>
  </div>

  <nav class="tabnav">
    <button class="tab active" onclick="showTab('cargar')"   id="tab-cargar">📝 Cargar</button>
    <button class="tab"        onclick="showTab('historial')" id="tab-historial">📋 Historial</button>
    <button class="tab"        onclick="showTab('tracker')"   id="tab-tracker">📊 Tracker</button>
    <button class="tab"        onclick="showTab('config')"    id="tab-config">⚙️ Config</button>
  </nav>

  <!-- CARGAR -->
  <div class="panel active" id="panel-cargar">
    <div class="form-group">
      <label class="form-label">Describí tu transacción</label>
      <textarea class="form-control" id="txInput" rows="3" placeholder="ej: 15000 super con visa&#10;ej: cobré 800 mil de Vision BI en Santander&#10;ej: compré 200 USDT a 1480 desde Buenbit"></textarea>
    </div>
    <button class="btn btn-primary" id="btnProcesar" onclick="procesarTx()">✨ Procesar con IA</button>
    <div id="groq-loader" class="loader" style="display:none"><span class="spinner"></span>Procesando…</div>
    <div id="form-resultado" style="display:none;margin-top:16px">
      <div class="divider"></div>
      <div class="card-title" style="margin-bottom:12px">Confirmá los datos</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-control" id="f-fecha">
        </div>
        <div class="form-group">
          <label class="form-label">Monto</label>
          <input type="number" class="form-control" id="f-monto" step="0.01" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Moneda</label>
          <select class="form-control" id="f-moneda">
            <option>ARS</option><option>USD</option><option>USDT</option><option>BTC</option>
            <option>PAXG</option><option>NVDA</option><option>AGRO</option><option>PAMP</option><option>SMCI</option><option>GTLB</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-control" id="f-categoria"><option value="">— elegir —</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">EN — destino del dinero</label>
        <input type="text" class="form-control" id="f-en" list="list-en" autocomplete="off" placeholder="¿adónde fue el dinero?">
        <datalist id="list-en"></datalist>
      </div>
      <div class="form-group">
        <label class="form-label">CON — origen del dinero</label>
        <input type="text" class="form-control" id="f-con" list="list-con" autocomplete="off" placeholder="¿de dónde vino?">
        <datalist id="list-con"></datalist>
      </div>
      <div class="form-group">
        <label class="form-label">Comentario</label>
        <input type="text" class="form-control" id="f-comentario" placeholder="Opcional">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cuota</label>
          <input type="number" class="form-control" id="f-cuota" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Cuotas</label>
          <input type="number" class="form-control" id="f-cuotas" min="1">
        </div>
      </div>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardarTx()">💾 Guardar en Sheets</button>
      <div style="height:8px"></div>
      <button class="btn btn-secondary" onclick="resetForm()">Cancelar</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="panel" id="panel-historial">
    <div class="hist-filters">
      <div class="hist-filter-row">
        <select id="h-año" onchange="renderHistorial()"><option value="">Todos los años</option></select>
        <select id="h-mes" onchange="renderHistorial()"><option value="">Todos los meses</option></select>
      </div>
      <div class="hist-filter-row">
        <input type="text" id="h-en" placeholder="Buscar EN..." oninput="renderHistorial()" list="list-h-en">
        <datalist id="list-h-en"></datalist>
        <select id="h-cat" onchange="renderHistorial()"><option value="">Todas las categorías</option></select>
      </div>
      <div class="hist-filter-row">
        <select id="h-moneda" onchange="renderHistorial()"><option value="">Todas las monedas</option></select>
        <button class="btn btn-secondary" style="flex:0 0 auto;padding:8px 14px;font-size:13px" onclick="syncSheet()">↻ Sync</button>
      </div>
    </div>
    <div class="hist-summary">
      <div class="hist-sum-box"><div class="hist-sum-label">Registros</div><div class="hist-sum-val" id="h-count">—</div></div>
      <div class="hist-sum-box"><div class="hist-sum-label">Suma ARS</div><div class="hist-sum-val" id="h-suma">—</div></div>
    </div>
    <div class="tbl-wrap" id="h-tabla"></div>
  </div>

  <!-- TRACKER -->
  <div class="panel" id="panel-tracker">
    <div class="tracker-filters">
      <div class="period-chip active" onclick="setTrackerPeriod('mes',this)">Este mes</div>
      <div class="period-chip" onclick="setTrackerPeriod('3m',this)">Últimos 3m</div>
      <div class="period-chip" onclick="setTrackerPeriod('6m',this)">Últimos 6m</div>
      <div class="period-chip" onclick="setTrackerPeriod('año',this)">Este año</div>
      <div class="period-chip" onclick="setTrackerPeriod('todo',this)">Todo</div>
    </div>
    <div class="tracker-summary">
      <div class="tr-stat"><div class="tr-stat-lbl">Total</div><div class="tr-stat-val" id="tr-total">—</div></div>
      <div class="tr-stat"><div class="tr-stat-lbl">Por mes</div><div class="tr-stat-val" id="tr-mes">—</div></div>
      <div class="tr-stat"><div class="tr-stat-lbl">Por semana</div><div class="tr-stat-val" id="tr-sem">—</div></div>
      <div class="tr-stat"><div class="tr-stat-lbl">Por día</div><div class="tr-stat-val" id="tr-dia">—</div></div>
    </div>
    <div class="cat-accordion" id="trackerAccordion"></div>
  </div>

  <!-- CONFIG -->
  <div class="panel" id="panel-config">
    <div class="config-section">
      <div class="config-title">🔗 Conexión</div>
      <div class="form-group">
        <label class="form-label">URL Apps Script</label>
        <input type="url" class="form-control" id="cfg-script-url" placeholder="https://script.google.com/...">
      </div>
      <div class="form-group">
        <label class="form-label">API Key Groq</label>
        <input type="password" class="form-control" id="cfg-groq-key" placeholder="gsk_...">
      </div>
      <button class="btn btn-primary" onclick="guardarConfig()">Guardar conexión</button>
    </div>
    <div class="config-section" style="margin-top:16px">
      <div class="config-title">💱 Tasas de cambio</div>
      <div class="config-row"><span class="config-key">USD → ARS</span><input type="number" class="config-input" id="tc-usd-ars"></div>
      <div class="config-row"><span class="config-key">USDT → USD</span><input type="number" class="config-input" id="tc-usdt-usd"></div>
      <div class="config-row"><span class="config-key">BTC → USD</span><input type="number" class="config-input" id="tc-btc-usd"></div>
      <div class="config-row"><span class="config-key">PAXG → USD</span><input type="number" class="config-input" id="tc-paxg-usd"></div>
      <div class="config-row"><span class="config-key">NVDA → USD</span><input type="number" class="config-input" id="tc-nvda-usd"></div>
      <div class="config-row"><span class="config-key">AGRO → USD</span><input type="number" class="config-input" id="tc-agro-usd"></div>
      <div class="config-row"><span class="config-key">PAMP → USD</span><input type="number" class="config-input" id="tc-pamp-usd"></div>
      <div class="config-row"><span class="config-key">SMCI → USD</span><input type="number" class="config-input" id="tc-smci-usd"></div>
      <div class="config-row"><span class="config-key">GTLB → USD</span><input type="number" class="config-input" id="tc-gtlb-usd"></div>
      <div style="height:10px"></div>
      <button class="btn btn-primary" onclick="guardarTasas()">Guardar tasas</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let allRows=[], tablasCuentas=[], tablasCategorias=[], tablasTipos=[];
let config={}, tasas={}, sortState={}, trackerPeriod='mes';
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

window.addEventListener('DOMContentLoaded',()=>{ cargarConfig(); cargarTasas(); cargarSheet(); });

function cargarConfig(){
  config=JSON.parse(localStorage.getItem('ft_config')||'{}');
  if(config.scriptUrl) document.getElementById('cfg-script-url').value=config.scriptUrl;
  if(config.groqKey)   document.getElementById('cfg-groq-key').value=config.groqKey;
}
function guardarConfig(){
  config.scriptUrl=document.getElementById('cfg-script-url').value.trim();
  config.groqKey=document.getElementById('cfg-groq-key').value.trim();
  localStorage.setItem('ft_config',JSON.stringify(config));
  showToast('Configuración guardada ✓');
}
function cargarTasas(){
  tasas=JSON.parse(localStorage.getItem('ft_tasas')||'{}');
  const defs={'usd-ars':1200,'usdt-usd':1,'btc-usd':85000,'paxg-usd':3200,'nvda-usd':120,'agro-usd':10,'pamp-usd':8,'smci-usd':50,'gtlb-usd':40};
  Object.entries(defs).forEach(([k,v])=>{ if(!tasas[k]) tasas[k]=v; const el=document.getElementById('tc-'+k); if(el) el.value=tasas[k]; });
}
function guardarTasas(){
  ['usd-ars','usdt-usd','btc-usd','paxg-usd','nvda-usd','agro-usd','pamp-usd','smci-usd','gtlb-usd'].forEach(k=>{ const v=parseFloat(document.getElementById('tc-'+k)?.value); if(!isNaN(v)) tasas[k]=v; });
  localStorage.setItem('ft_tasas',JSON.stringify(tasas));
  showToast('Tasas guardadas ✓');
}

const TABS=['cargar','historial','tracker','config'];
function showTab(id){
  TABS.forEach(t=>{ document.getElementById('panel-'+t).classList.toggle('active',t===id); const b=document.getElementById('tab-'+t); if(b) b.classList.toggle('active',t===id); });
  if(id==='historial') renderHistorial();
  if(id==='tracker')   renderTracker();
}

async function syncSheet(){ const b=document.getElementById('btnSync'); b.style.animation='spin .7s linear infinite'; setSyncDot('loading'); await cargarSheet(); b.style.animation=''; }

async function cargarSheet(){
  const url=config.scriptUrl;
  if(!url){ showToast('Configurá la URL del Script ⚙️'); return; }
  try{
    const r=await fetch(url+'?action=read');
    const d=await r.json();
    if(d.status==='ok'){ allRows=d.rows||[]; poblarFiltros(); showToast(`${allRows.length} filas ✓`); setSyncDot('ok'); }
  } catch(e){ showToast('Error al cargar'); setSyncDot('err'); }
  try{
    const r2=await fetch(url+'?action=cuentas');
    const d2=await r2.json();
    if(d2.status==='ok'){ tablasCuentas=d2.cuentas||[]; tablasCategorias=d2.categorias||[]; tablasTipos=d2.tipos||[]; poblarDropdowns(); }
  } catch(e){}
}

function poblarFiltros(){

async function procesarTx(){
  const txt=document.getElementById('txInput').value.trim();
  if(!txt){ showToast('Escribí una transacción'); return; }
  const key=config.groqKey;
  if(!key){ showToast('Configurá tu API Key de Groq ⚙️'); showTab('config'); return; }
  document.getElementById('groq-loader').style.display='block';
  document.getElementById('btnProcesar').disabled=true;
  document.getElementById('form-resultado').style.display='none';
  const hoy=new Date().toISOString().split('T')[0];
  const listaEN=tablasCuentas.filter(c=>c.tipo_cuenta==='Egreso'||c.tipo_cuenta==='Balance').map(c=>c.nombre).filter((v,i,a)=>a.indexOf(v)===i).sort().join(', ')||'Super, Verduleria, Alquiler, Spotify...';
  const listaCON=tablasCuentas.filter(c=>c.tipo_cuenta==='Ingreso'||c.tipo_cuenta==='Balance').map(c=>c.nombre).filter((v,i,a)=>a.indexOf(v)===i).sort().join(', ')||'Visa Santander, MP, Efectivo, Santander...';
  const listaCat=[...new Set(tablasCategorias.map(c=>c.categoria).filter(c=>c&&c!=='TBD'))].sort().join(', ')||'Alimentación, Vivienda, Movilidad, Salidas, Suscripciones, Viajes, Ocio, Compras Tech, Compras Personales, Regalos, Mascotas, Activos Adquiridos, Evangelista, Varios / TBD';
  const prompt=`Sos un asistente de finanzas personales argentino. Extraé los datos y respondé SOLO con JSON array válido sin texto ni markdown.

Transacción: "${txt}"

REGLAS CRÍTICAS:
1. EN = destino del dinero. CON = origen del dinero.
2. Usá EXACTAMENTE los nombres de las listas. Sin cambiar tildes ni mayúsculas.
3. Si el nombre se parece a uno de la lista aunque esté mal escrito, usá el de la lista.
4. Monto SIEMPRE positivo.
5. Compra de activos (USD, USDT, BTC, NVDA, ETF, etc.): generá DOS objetos. Primera: egreso de la moneda que pagás. Segunda: ingreso del activo.
6. Sin fecha → ${hoy}. Moneda default: ARS.

Nombres válidos para EN: ${listaEN}
Nombres válidos para CON: ${listaCON}
Categorías válidas: ${listaCat}

Respondé con JSON array (1 o 2 elementos):
[{"fecha":"YYYY-MM-DD","monto":0,"moneda":"ARS","descripcion":"nombre exacto EN","medio_pago":"nombre exacto CON","categoria":"categoría exacta","comentario":"","cuota":null,"cuotas":null}]`;
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],temperature:0.1,max_tokens:500})});
    const d=await res.json();
    const raw=d.choices?.[0]?.message?.content||'[]';
    const clean=raw.replace(/```json|```/g,'').trim();
    const txs=JSON.parse(clean);
    const tx=Array.isArray(txs)?txs[0]:txs;
    window._pendingTx2=(Array.isArray(txs)&&txs.length>1)?txs[1]:null;
    document.getElementById('f-fecha').value=tx.fecha||hoy;
    document.getElementById('f-monto').value=tx.monto||'';
    document.getElementById('f-moneda').value=tx.moneda||'ARS';
    document.getElementById('f-en').value=tx.descripcion||'';
    document.getElementById('f-con').value=tx.medio_pago||'';
    document.getElementById('f-categoria').value=tx.categoria||'';
    document.getElementById('f-comentario').value=tx.comentario||'';
    document.getElementById('f-cuota').value=tx.cuota||'';
    document.getElementById('f-cuotas').value=tx.cuotas||'';
    document.getElementById('form-resultado').style.display='block';
    if(window._pendingTx2) showToast('⚡ 2 transacciones detectadas');
  } catch(e){ showToast('Error con Groq'); console.error(e); }
  finally{ document.getElementById('groq-loader').style.display='none'; document.getElementById('btnProcesar').disabled=false; }
}

async function guardarTx(){
  const url=config.scriptUrl;
  if(!url){ showToast('Configurá la URL del Script ⚙️'); return; }
  document.getElementById('btnGuardar').disabled=true;
  setSyncDot('loading');
  const fila=[
    document.getElementById('f-fecha').value,
    parseFloat(document.getElementById('f-monto').value)||0,
    document.getElementById('f-moneda').value,
    document.getElementById('f-en').value.trim(),
    document.getElementById('f-comentario').value.trim(),
    document.getElementById('f-con').value.trim(),
    '',
    document.getElementById('f-categoria').value,
    document.getElementById('f-cuota').value||'',
    document.getElementById('f-cuotas').value||'',
    '','',
  ];
  const rows=[fila];
  if(window._pendingTx2){
    const t=window._pendingTx2;
    rows.push([t.fecha||fila[0],t.monto||0,t.moneda||'ARS',t.descripcion||'',t.comentario||'',t.medio_pago||'','',t.categoria||'Activos Adquiridos','','','','']);
  }
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows})});
    const d=await res.json();
    if(d.status==='ok'){ showToast(`✓ ${rows.length} guardada(s)`); setSyncDot('ok'); resetForm(); await cargarSheet(); }
    else { showToast('Error: '+d.message); setSyncDot('err'); }
  } catch(e){ showToast('Error de conexión'); setSyncDot('err'); }
  finally{ document.getElementById('btnGuardar').disabled=false; window._pendingTx2=null; }
}

function resetForm(){ document.getElementById('txInput').value=''; document.getElementById('form-resultado').style.display='none'; window._pendingTx2=null; }

function renderHistorial(){
  let rows=allRows;
  const año=parseInt(document.getElementById('h-año')?.value)||null;
  const mes=parseInt(document.getElementById('h-mes')?.value)||null;
  const mon=document.getElementById('h-moneda')?.value||'';
  const enF=(document.getElementById('h-en')?.value||'').trim().toLowerCase();
  const catF=document.getElementById('h-cat')?.value||'';
  if(año) rows=rows.filter(r=>partesFecha(r).y===año);
  if(mes) rows=rows.filter(r=>partesFecha(r).m===mes);
  if(mon) rows=rows.filter(r=>str(r.moneda)===mon);
  if(enF) rows=rows.filter(r=>str(r.descripcion).toLowerCase().includes(enF));
  if(catF) rows=rows.filter(r=>str(r.categoria)===catF);
  if(año){ const ms=[...new Set(allRows.filter(r=>partesFecha(r).y===año).map(r=>partesFecha(r).m).filter(Boolean))].sort((a,b)=>a-b); const el=document.getElementById('h-mes'); if(el) el.innerHTML='<option value="">Todos los meses</option>'+ms.map(m=>`<option value="${m}">${MESES[m-1]}</option>`).join(''); }
  const sumaARS=rows.filter(r=>!str(r.moneda)||str(r.moneda)==='ARS').reduce((s,r)=>s+(parseFloat(r.monto)||0),0);
  document.getElementById('h-count').textContent=rows.length;
  document.getElementById('h-suma').textContent='$'+fmtNum(sumaARS);
  window._hRows=[...rows].sort((a,b)=>{ const fa=partesFecha(a),fb=partesFecha(b); return(fb.y-fa.y)||(fb.m-fa.m)||(fb.d-fa.d); });
  renderTablaHistorial(window._hRows, sortState['h']?.col||'fecha', sortState['h']?.dir||'desc');
}

function renderTablaHistorial(rows,col='fecha',dir='desc'){
  const s=sortRows(rows,col,dir);
  document.getElementById('h-tabla').innerHTML=s.length
    ?`<table><thead><tr>
        <th class="sortable" onclick="setSortState('h','fecha',getSortDir('h','fecha'));renderTablaHistorial(window._hRows||[])">Fecha${sortIcon('h','fecha')}</th>
        <th class="sortable" onclick="setSortState('h','monto',getSortDir('h','monto'));renderTablaHistorial(window._hRows||[])">Monto${sortIcon('h','monto')}</th>
        <th>Mon</th>
        <th class="sortable" onclick="setSortState('h','desc',getSortDir('h','desc'));renderTablaHistorial(window._hRows||[])">EN${sortIcon('h','desc')}</th>
        <th>CON</th><th>Categoría</th>
      </tr></thead><tbody>${s.map(r=>`<tr>
        <td class="td-mono td-muted" style="white-space:nowrap">${esc(fmtFecha(r))}</td>
        <td class="td-mono">${esc(fmtMonto(parseFloat(r.monto)||0))}</td>
        <td class="td-muted">${esc(str(r.moneda))}</td>
        <td>${esc(str(r.descripcion))}</td>
        <td class="td-muted">${esc(str(r.medio_pago))}</td>
        <td>${r.categoria?`<span class="badge badge-muted" style="font-size:9px">${esc(str(r.categoria))}</span>`:''}</td>
      </tr>`).join('')}</tbody></table>`
    :'<div class="empty">Sin registros con estos filtros</div>';
}

function setTrackerPeriod(p,el){ trackerPeriod=p; document.querySelectorAll('.period-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderTracker(); }

function getTrackerRows(){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth()+1;
  return allRows.filter(r=>{
    const f=partesFecha(r); if(!f.y) return false;
    const cat=str(r.categoria);
    if(cat==='Cuenta Balance'||cat==='Activos Adquiridos') return false;
    if(trackerPeriod==='mes') return f.y===y&&f.m===m;
    if(trackerPeriod==='3m'){ const d=new Date(now); d.setMonth(d.getMonth()-3); return new Date(f.y,f.m-1,f.d||1)>=d; }
    if(trackerPeriod==='6m'){ const d=new Date(now); d.setMonth(d.getMonth()-6); return new Date(f.y,f.m-1,f.d||1)>=d; }
    if(trackerPeriod==='año') return f.y===y;
    return true;
  });
}
function getDias(){ if(trackerPeriod==='mes') return 30; if(trackerPeriod==='3m') return 91; if(trackerPeriod==='6m') return 182; if(trackerPeriod==='año'){ const n=new Date(); return Math.max(1,Math.round((n-new Date(n.getFullYear(),0,1))/86400000)); } if(!allRows.length) return 365; const fs=allRows.map(r=>partesFecha(r)).filter(f=>f.y); const min=fs.reduce((a,f)=>{ const d=new Date(f.y,f.m-1,f.d||1); return d<a?d:a; },new Date()); return Math.max(1,Math.round((new Date()-min)/86400000)); }

function renderTracker(){
  const rows=getTrackerRows(), dias=getDias(), meses=dias/30.4, sems=dias/7;
  const totalARS=rows.filter(r=>!str(r.moneda)||str(r.moneda)==='ARS').reduce((s,r)=>s+(parseFloat(r.monto)||0),0);
  document.getElementById('tr-total').textContent='$'+fmtNum(totalARS);
  document.getElementById('tr-mes').textContent='$'+fmtNum(totalARS/meses);
  document.getElementById('tr-sem').textContent='$'+fmtNum(totalARS/sems);
  document.getElementById('tr-dia').textContent='$'+fmtNum(totalARS/dias);
  const byCat={};
  rows.filter(r=>!str(r.moneda)||str(r.moneda)==='ARS').forEach(r=>{
    const cat=str(r.categoria)||'Sin categoría';
    if(!byCat[cat]) byCat[cat]={total:0,ens:{}};
    byCat[cat].total+=parseFloat(r.monto)||0;
    const en=str(r.descripcion)||'(sin EN)';
    if(!byCat[cat].ens[en]) byCat[cat].ens[en]={total:0,count:0};
    byCat[cat].ens[en].total+=parseFloat(r.monto)||0;
    byCat[cat].ens[en].count++;
  });
  const sorted=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total);
  const maxT=sorted[0]?.[1]?.total||1;
  document.getElementById('trackerAccordion').innerHTML=sorted.map(([cat,data])=>{
    const pct=Math.round(data.total/totalARS*100)||0;
    const barPct=Math.round(data.total/maxT*100);
    const ensSorted=Object.entries(data.ens).sort((a,b)=>b[1].total-a[1].total);
    return`<div class="cat-item">
      <div class="cat-header" onclick="toggleCat(this)">
        <div class="cat-left"><div class="cat-name">${esc(cat)}</div><div class="cat-sub">${ensSorted.length} conceptos</div></div>
        <div class="cat-right"><div class="cat-total">$${fmtNum(data.total)}</div><div class="cat-pct">${pct}% del total</div></div>
        <div class="cat-arrow">▼</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${barPct}%"></div></div>
      <div class="cat-body">
        <div class="cat-stats">
          <div class="cat-stat-box"><div class="cat-stat-lbl">Por mes</div><div class="cat-stat-val">$${fmtNum(data.total/meses)}</div></div>
          <div class="cat-stat-box"><div class="cat-stat-lbl">Por semana</div><div class="cat-stat-val">$${fmtNum(data.total/sems)}</div></div>
          <div class="cat-stat-box"><div class="cat-stat-lbl">Por día</div><div class="cat-stat-val">$${fmtNum(data.total/dias)}</div></div>
        </div>
        <div class="en-list">${ensSorted.map(([en,d])=>`
          <div class="en-row">
            <span class="en-name">${esc(en)}</span>
            <div class="en-right"><span class="en-count">${d.count}×</span><span class="en-amt">$${fmtNum(d.total)}</span></div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('')||'<div class="empty">Sin datos de egresos en este período</div>';
}
function toggleCat(h){ const it=h.closest('.cat-item'); const was=it.classList.contains('open'); document.querySelectorAll('.cat-item').forEach(i=>i.classList.remove('open')); if(!was) it.classList.add('open'); }

function str(v){ return String(v||'').trim(); }
function esc(s){ const d=document.createElement('div'); d.textContent=str(s); return d.innerHTML; }
function fmtNum(n){ return Math.round(n).toLocaleString('es-AR'); }
function partesFecha(r){ const f=str(r.fecha); if(!f) return{y:null,m:null,d:null}; if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f)){const[d,m,y]=f.split('/');return{y:+y,m:+m,d:+d};} if(/^\d{4}-\d{2}-\d{2}/.test(f)){const[y,m,d]=f.split('-');return{y:+y,m:+m,d:+d};} const dt=new Date(f); if(!isNaN(dt.getTime())) return{y:dt.getFullYear(),m:dt.getMonth()+1,d:dt.getDate()}; return{y:null,m:null,d:null}; }
function fmtFecha(r){ const{y,m,d}=partesFecha(r); if(!y) return str(r.fecha)||'—'; return`${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`; }
function fmtMonto(n){ if(isNaN(n)) return'—'; const a=Math.abs(n); if(a>=1000000) return(n/1000000).toFixed(2)+'M'; if(a>=1000) return n.toLocaleString('es-AR',{maximumFractionDigits:0}); return n.toFixed(2); }
function sortRows(rows,col,dir){ return[...rows].sort((a,b)=>{ let va,vb; if(col==='fecha'){const fa=partesFecha(a),fb=partesFecha(b);va=(fa.y||0)*10000+(fa.m||0)*100+(fa.d||0);vb=(fb.y||0)*10000+(fb.m||0)*100+(fb.d||0);}else if(col==='monto'){va=parseFloat(a.monto)||0;vb=parseFloat(b.monto)||0;}else{va=str(a.descripcion).toLowerCase();vb=str(b.descripcion).toLowerCase();} if(va<vb) return dir==='asc'?-1:1; if(va>vb) return dir==='asc'?1:-1; return 0; }); }
function getSortDir(id,col){ const s=sortState[id]; if(!s||s.col!==col) return'desc'; return s.dir==='desc'?'asc':'desc'; }
function setSortState(id,col,dir){ sortState[id]={col,dir}; }
function sortIcon(id,col){ const s=sortState[id]; if(!s||s.col!==col) return'<span class="sort-icon">⇅</span>'; return`<span class="sort-icon active">${s.dir==='asc'?'↑':'↓'}</span>`; }
function setSyncDot(state){ document.getElementById('syncDot').className='sync-dot'+(state?' '+state:''); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
document.getElementById('txInput').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();procesarTx();} });
</script>
